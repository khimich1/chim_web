name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Ruff
        run: ruff check .

      - name: Mypy (Task 95 — scoped services + API)
        run: mypy app/services/ app/api/

      - name: Pytest
        run: pytest
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET: "test-jwt-secret-at-least-32-bytes-long"
          CORS_ORIGINS: "http://localhost:3000"

      - name: Coverage gate (Task 29)
        run: python scripts/check_coverage.py
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          JWT_SECRET: "test-jwt-secret-at-least-32-bytes-long"
          CORS_ORIGINS: "http://localhost:3000"

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps (OpenAPI export)
        working-directory: backend
        run: pip install -r requirements.txt

      - name: ESLint
        run: npm run lint

      - name: Vitest
        run: npm run test

      - name: OpenAPI types drift check (Task 95)
        run: |
          python scripts/export_openapi.py -o openapi.json
          cd ../frontend && npm run check:api-types
        working-directory: backend

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8080"

  docker-compose:
    name: Docker Compose smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for compose
        run: |
          cp .env.example .env
          sed -i 's/^JWT_SECRET=.*/JWT_SECRET=ci-test-jwt-secret-at-least-32-bytes-long/' .env

      - name: Build and start stack
        run: docker compose up --build -d --wait

      - name: Smoke test via nginx
        run: |
          for attempt in $(seq 1 12); do
            if curl -sf http://localhost:8080/health >/dev/null \
              && curl -sf -o /dev/null -w "%{http_code}" http://localhost:8080/ | grep -q '^200$'; then
              echo "Stack smoke test passed (backend /health + frontend /)"
              exit 0
            fi
            echo "Waiting for nginx routes... (${attempt}/12)"
            sleep 5
          done
          echo "Stack failed smoke test"
          docker compose ps
          docker compose logs
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v

  e2e:
    name: Playwright smoke E2E (Task 99)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Create E2E content DBs
        run: python scripts/e2e/create_content_dbs.py

      - name: Create .env for compose
        run: |
          cp .env.example .env
          sed -i 's/^JWT_SECRET=.*/JWT_SECRET=ci-test-jwt-secret-at-least-32-bytes-long/' .env

      - name: Build and start stack (E2E fixtures)
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml up --build -d --wait

      - name: Seed E2E users and homework
        id: seed
        run: |
          STATE=$(docker compose exec -T backend python -m app.cli.seed_e2e)
          echo "$STATE"
          echo "E2E_HOMEWORK_ID=$(echo "$STATE" | python -c 'import json,sys; print(json.load(sys.stdin)["homeworkId"])')" >> "$GITHUB_ENV"
          echo "E2E_STUDENT_EMAIL=$(echo "$STATE" | python -c 'import json,sys; print(json.load(sys.stdin)["studentEmail"])')" >> "$GITHUB_ENV"
          echo "E2E_STUDENT_PASSWORD=$(echo "$STATE" | python -c 'import json,sys; print(json.load(sys.stdin)["studentPassword"])')" >> "$GITHUB_ENV"
          echo "E2E_CORRECT_ANSWER=$(echo "$STATE" | python -c 'import json,sys; print(json.load(sys.stdin)["correctAnswer"])')" >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run smoke E2E
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:8080
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml down -v
