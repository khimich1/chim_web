[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.coverage.run]
# Starlette/FastAPI TestClient runs async routes on a thread pool.
concurrency = ["thread"]
source = ["app"]
omit = [
    "app/cli/*",
    "tests/*",
]

[tool.coverage.report]
precision = 0
show_missing = true
skip_covered = true

[tool.ruff]
target-version = "py310"
exclude = ["tests", "scripts"]

[tool.ruff.lint]
# Pyflakes only — avoids mass churn on import order / line length in legacy code.
select = ["F"]

[tool.mypy]
python_version = "3.10"
files = ["app"]
explicit_package_bases = true
namespace_packages = true
plugins = ["pydantic.mypy"]
warn_return_any = false
warn_unused_configs = true
disallow_untyped_defs = false
check_untyped_defs = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "langchain_openai.*",
    "langchain_openai",
    "langchain_core.*",
]
ignore_missing_imports = true

# LangChain / tutor graph: constructors and dynamic tools are not fully typed.
[[tool.mypy.overrides]]
module = [
    "app.services.tutor.*",
    "app.services.rag.query_rewrite",
    "app.services.rag.embeddings",
]
disable_error_code = [
    "call-arg",
    "call-overload",
    "attr-defined",
    "assignment",
    "union-attr",
    "return-value",
    "valid-type",
    "arg-type",
]

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = false
warn_required_dynamic_aliases = true
