[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os

# URL is intentionally left blank: alembic/env.py injects it from
# app settings (DATABASE_URL). Keep this empty so env.py's fallback runs;
# a non-empty placeholder here would override DATABASE_URL (see env.py).
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
