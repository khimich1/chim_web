# Override for Playwright E2E: mount minimal content SQLite from e2e-fixtures/.
# Usage: python scripts/e2e/create_content_dbs.py && docker compose -f docker-compose.yml -f docker-compose.e2e.yml up --build

services:
  backend:
    volumes:
      - ./e2e-fixtures/test_ege.db:/app/test_ege.db:ro
      - ./e2e-fixtures/test_oge.db:/app/test_oge.db:ro
      - ./e2e-fixtures/prepared_lectures.db:/app/prepared_lectures.db:ro
